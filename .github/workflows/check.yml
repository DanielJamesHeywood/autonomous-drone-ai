name: Perform Checks
on: push
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        run: |
          rustup update stable && rustup default stable
          rustup component add rustfmt
      - name: Perform Checks
        run: |
          cargo check
          cargo fmt --all --check
